<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>开发者社区 · KAVA</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,200" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6750A4;
            --primary-light: #7c6ab3;
            --surface: #ffffff;
            --background: #f8f9fa;
            --text: #1a1a1a;
            --text-secondary: #666666;
            --border: #e0e0e0;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
            --muted: #9e9e9e;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        
        .header {
            background: var(--surface);
            border-radius: 30px;
            padding: 10px 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            position: sticky;
            top: 8px;
            z-index: 100;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            line-height: 1;
        }
        
        .logo .material-symbols-outlined {
            font-size: 24px;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo span:last-child {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1;
        }
        
        .right-section {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .notification-icon {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            font-size: 0.7rem;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }
        
        .online-count {
            background: #2d2d2d;
            color: white;
            padding: 5px 10px;
            border-radius: 30px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
            line-height: 1;
        }
        
        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 4px;
            background: var(--success);
            animation: pulse 2s infinite;
            display: inline-block;
        }
        
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
            min-height: 40px;
            line-height: 1;
        }
        
        .btn.secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn.small {
            padding: 5px 10px;
            font-size: 0.8rem;
            min-height: 32px;
        }
        
        .profile-card {
            background: var(--surface);
            border-radius: 24px;
            padding: 20px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: sticky;
            top: 80px;
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50px;
            background: #EADDFF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: 600;
            color: #21005E;
            margin: 0 auto 12px;
            cursor: pointer;
            position: relative;
            line-height: 1;
        }
        
        .admin-badge {
            background: var(--warning);
            color: #333;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-left: 8px;
            line-height: 1;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            line-height: 1;
        }
        
        /* 登录弹窗样式修复 */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
            backdrop-filter: blur(4px);
        }
        
        .modal-content {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 24px;
            border-radius: 28px;
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: 1;
        }
        
        .input-wrapper {
            position: relative;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        
        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            border: 1px solid var(--border);
            border-radius: 30px;
            font-size: 0.95rem;
            font-family: inherit;
            line-height: 1.2;
        }
        
        .code-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        
        .code-input-wrapper {
            position: relative;
            flex: 1;
        }
        
        .code-input-wrapper input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            border: 1px solid var(--border);
            border-radius: 30px;
            font-size: 0.95rem;
            line-height: 1.2;
        }
        
        .send-code-btn {
            min-width: 100px;
            background: #f0f0f0;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            padding: 12px;
            font-size: 0.9rem;
            line-height: 1.2;
            white-space: nowrap;
        }
        
        .send-code-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .hidden { display: none !important; }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 2000;
            animation: slideIn 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: 1;
        }
        
        .error-toast {
            background: var(--danger);
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            color: #999;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo" onclick="showHome()">
                <span class="material-symbols-outlined">code_blocks</span>
                <span>DevCommunity</span>
            </div>
            
            <div class="right-section">
                <div id="notificationSection" class="hidden">
                    <div class="notification-icon" onclick="toggleNotifications()">
                        <span class="material-symbols-outlined">notifications</span>
                        <span id="notificationBadge" class="notification-badge hidden">0</span>
                    </div>
                </div>
                
                <div class="online-count">
                    <span class="online-dot"></span>
                    <span id="onlineCount">0</span>
                </div>
                
                <div id="auth-section">
                    <button class="btn" onclick="showLogin()">
                        <span class="material-symbols-outlined">login</span> 登录
                    </button>
                </div>
                
                <div id="user-section" class="hidden">
                    <span class="badge">
                        <span class="material-symbols-outlined" style="font-size: 16px;">verified</span> 已验证
                    </span>
                    <span class="admin-badge" id="adminBadge">管理员</span>
                    <span id="userStatusBadge" class="status-badge hidden"></span>
                    <button class="btn small" onclick="logout()">
                        <span class="material-symbols-outlined">logout</span> 退出
                    </button>
                </div>
            </div>
        </header>

        <!-- 首页视图 -->
        <div id="homeView">
            <div class="profile-grid">
                <div class="profile-card">
                    <div class="profile-avatar" id="homeAvatar" onclick="showEditProfile()">
                        U
                        <span class="online-badge-small" id="homeOnlineBadge"></span>
                    </div>
                    <div class="profile-name" id="homeDisplayName">未登录</div>
                    <div class="profile-bio" id="homeBio">请先登录</div>
                    
                    <div class="profile-stats">
                        <div class="stat-item" onclick="showMyPosts()">
                            <div class="stat-value" id="homePostCount">0</div>
                            <div class="stat-label">帖子</div>
                        </div>
                        <div class="stat-item" onclick="showMyComments()">
                            <div class="stat-value" id="homeCommentCount">0</div>
                            <div class="stat-label">评论</div>
                        </div>
                        <div class="stat-item" onclick="showMyLikes()">
                            <div class="stat-value" id="homeLikeCount">0</div>
                            <div class="stat-label">获赞</div>
                        </div>
                        <div class="stat-item" onclick="showMyFollowers()">
                            <div class="stat-value" id="homeFollowerCount">0</div>
                            <div class="stat-label">粉丝</div>
                        </div>
                    </div>
                    
                    <button class="edit-profile-btn" onclick="showEditProfile()">
                        <span class="material-symbols-outlined">edit</span> 编辑资料
                    </button>
                    
                    <button class="edit-profile-btn" style="background: var(--warning);" id="adminPanelBtn" onclick="showAdminPanel()">
                        <span class="material-symbols-outlined">admin_panel_settings</span> 管理面板
                    </button>
                </div>
                
                <div class="main-content">
                    <div id="compose-section" class="compose-box hidden">
                        <textarea id="postContent" placeholder="分享你的开发心得..."></textarea>
                        <button class="btn" onclick="publishPost()" style="width:100%;">
                            <span class="material-symbols-outlined">send</span> 发布帖子
                        </button>
                        <div id="mutedMessage" class="muted-message hidden"></div>
                    </div>
                    
                    <div class="tabs">
                        <div class="tab active" onclick="switchTab('posts')">
                            <span class="material-symbols-outlined">post</span> 最新
                        </div>
                        <div class="tab" onclick="switchTab('hot')">
                            <span class="material-symbols-outlined">whatshot</span> 热门
                        </div>
                        <div class="tab" onclick="switchTab('following')">
                            <span class="material-symbols-outlined">group</span> 关注
                        </div>
                    </div>
                    
                    <div id="postsList"></div>
                    <div id="hotPostsList" class="hidden"></div>
                    <div id="followingPostsList" class="hidden"></div>
                </div>
            </div>
        </div>

        <!-- 登录弹窗（修复版） -->
        <div id="loginModal" class="modal hidden">
            <div class="modal-content">
                <h3>
                    <span class="material-symbols-outlined">login</span>
                    邮箱验证码登录
                </h3>
                
                <div class="input-wrapper">
                    <span class="input-icon material-symbols-outlined">mail</span>
                    <input type="email" id="loginEmail" placeholder="邮箱" value="511651251@qq.com">
                </div>
                
                <div class="code-row">
                    <div class="code-input-wrapper">
                        <span class="input-icon material-symbols-outlined">pin</span>
                        <input type="text" id="loginCode" placeholder="验证码">
                    </div>
                    <button onclick="sendEmailCode()" id="sendCodeBtn" class="send-code-btn">获取验证码</button>
                </div>
                
                <button class="btn" onclick="doLoginWithCode()" style="width: 100%; padding: 12px; justify-content: center;">登录 / 注册</button>
                
                <p style="text-align:center; margin-top:12px;">
                    <button class="btn secondary small" onclick="hideLogin()" style="justify-content: center;">取消</button>
                </p>
            </div>
        </div>

        <footer class="footer">
            <span class="material-symbols-outlined" style="font-size: 14px;">security</span> 开发者社区 · 用户状态
        </footer>
    </div>

    <script>
        const SUPABASE_URL = 'https://fnlaryjanmfqvnonqfyj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZubGFyeWphbm1mcXZub25xZnlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNzQzNzgsImV4cCI6MjA4NzY1MDM3OH0.4uGXyVd_6XQnK3o1vu_sDhpdRyrM67JFaBm2SnuJf1M';
        
        const EMAIL_SERVICE_URL = 'http://69.165.65.242:3000'; // 你的邮件服务地址
        
        let currentUser = null;
        let allPosts = [];
        let onlineUsers = JSON.parse(localStorage.getItem('onlineUsers') || '[]');
        let userProfile = null;
        
        // 验证码倒计时
        let countdown = 60;
        let timer = null;
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error-toast' : ''}`;
            toast.innerHTML = `
                <span class="material-symbols-outlined">${isError ? 'error' : 'check_circle'}</span>
                ${message}
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        // ===== 邮箱验证码登录 =====
        async function sendEmailCode() {
            const email = document.getElementById('loginEmail').value.trim();
            
            if (!email) {
                showToast('请输入邮箱', true);
                return;
            }
            
            const btn = document.getElementById('sendCodeBtn');
            btn.disabled = true;
            btn.textContent = '发送中...';
            
            try {
                const res = await fetch(`${EMAIL_SERVICE_URL}/send-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();
                
                if (data.error) {
                    showToast(data.error, true);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                } else {
                    showToast('验证码已发送，请查收邮件');
                    startCountdown();
                }
            } catch (err) {
                showToast('网络错误: ' + err.message, true);
                btn.disabled = false;
                btn.textContent = '获取验证码';
            }
        }
        
        function startCountdown() {
            countdown = 60;
            const btn = document.getElementById('sendCodeBtn');
            
            if (timer) clearInterval(timer);
            
            timer = setInterval(() => {
                countdown--;
                btn.textContent = `${countdown}秒`;
                
                if (countdown <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                }
            }, 1000);
        }
        
        async function doLoginWithCode() {
            const email = document.getElementById('loginEmail').value.trim();
            const code = document.getElementById('loginCode').value.trim();
            
            if (!email || !code) {
                showToast('请填写邮箱和验证码', true);
                return;
            }
            
            try {
                const res = await fetch(`${EMAIL_SERVICE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });
                
                const data = await res.json();
                
                if (data.error) {
                    showToast(data.error, true);
                } else {
                    await loginOrRegisterWithEmail(email);
                }
            } catch (err) {
                showToast('网络错误: ' + err.message, true);
            }
        }
        
        async function loginOrRegisterWithEmail(email) {
            try {
                const userRes = await fetch(`${SUPABASE_URL}/rest/v1/users?email=eq.${encodeURIComponent(email)}`, {
                    headers: { 'apikey': SUPABASE_KEY }
                });
                
                let users = await userRes.json();
                let user;
                
                if (!users || users.length === 0) {
                    const username = email.split('@')[0];
                    const newUser = {
                        email: email,
                        username: username,
                        avatar: username[0].toUpperCase(),
                        bio: '热爱编程的开发者',
                        role: 'user',
                        status: 'active',
                        created_at: new Date().toISOString(),
                        last_login: new Date().toISOString()
                    };
                    
                    const createRes = await fetch(`${SUPABASE_URL}/rest/v1/users`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=representation'
                        },
                        body: JSON.stringify(newUser)
                    });
                    
                    user = await createRes.json();
                } else {
                    user = users[0];
                    await fetch(`${SUPABASE_URL}/rest/v1/users?id=eq.${user.id}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ last_login: new Date().toISOString() })
                    });
                }
                
                currentUser = {
                    id: user.id,
                    email: user.email,
                    username: user.username,
                    status: user.status || 'active'
                };
                
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                userProfile = {
                    name: user.username || user.email.split('@')[0],
                    bio: user.bio || '热爱编程的开发者',
                    avatar: user.avatar || user.email[0].toUpperCase(),
                    role: user.role || 'user'
                };
                
                localStorage.setItem('userProfile', JSON.stringify(userProfile));
                
                updateUIForUser(true);
                hideLogin();
                await loadPosts();
                updateOnlineStatus();
                showToast('登录成功');
                
            } catch (err) {
                console.error('登录错误:', err);
                showToast('网络错误: ' + err.message, true);
            }
        }
        
        function updateUIForUser(isLoggedIn) {
            const authSection = document.getElementById('auth-section');
            const userSection = document.getElementById('user-section');
            const adminBadge = document.getElementById('adminBadge');
            const adminPanelBtn = document.getElementById('adminPanelBtn');
            const homeAvatar = document.getElementById('homeAvatar');
            const homeDisplayName = document.getElementById('homeDisplayName');
            const homeBio = document.getElementById('homeBio');
            
            if (isLoggedIn && currentUser) {
                authSection.classList.add('hidden');
                userSection.classList.remove('hidden');
                
                // ✅ 只有特定邮箱才显示管理员面板
                if (currentUser.email === 'renlei540@qq.com') {
                    adminBadge.classList.remove('hidden');
                    adminPanelBtn.classList.remove('hidden');
                } else {
                    adminBadge.classList.add('hidden');
                    adminPanelBtn.classList.add('hidden');
                }
                
                if (userProfile) {
                    homeAvatar.textContent = userProfile.avatar || currentUser.email[0].toUpperCase();
                    homeDisplayName.textContent = userProfile.name || currentUser.email.split('@')[0];
                    homeBio.textContent = userProfile.bio || '热爱编程的开发者';
                }
            } else {
                authSection.classList.remove('hidden');
                userSection.classList.add('hidden');
                adminBadge.classList.add('hidden');
                adminPanelBtn.classList.add('hidden');
                homeAvatar.textContent = 'U';
                homeDisplayName.textContent = '未登录';
                homeBio.textContent = '请先登录';
                currentUser = null;
            }
        }
        
        function updateOnlineStatus() {
            onlineUsers = JSON.parse(localStorage.getItem('onlineUsers') || '[]');
            document.getElementById('onlineCount').textContent = onlineUsers.length;
        }
        
        function loadPosts() {
            // 简化版，实际应该从Supabase加载
            document.getElementById('postsList').innerHTML = '<div class="empty-state">暂无帖子</div>';
        }
        
        function showLogin() { 
            document.getElementById('loginModal').classList.remove('hidden'); 
        }
        
        function hideLogin() { 
            document.getElementById('loginModal').classList.add('hidden');
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
            const btn = document.getElementById('sendCodeBtn');
            if (btn) {
                btn.disabled = false;
                btn.textContent = '获取验证码';
            }
        }
        
        function logout() {
            currentUser = null;
            userProfile = null;
            localStorage.removeItem('currentUser');
            localStorage.removeItem('userProfile');
            updateUIForUser(false);
            showToast('已退出');
        }
        
        function showHome() {
            document.getElementById('homeView').classList.remove('hidden');
        }
        
        function showAdminPanel() {
            showToast('管理员功能开发中', true);
        }
        
        function showEditProfile() {
            showToast('请先登录', true);
        }
        
        // 初始化
        updateOnlineStatus();
        
        // 检查登录状态
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            try {
                currentUser = JSON.parse(savedUser);
                userProfile = JSON.parse(localStorage.getItem('userProfile') || '{}');
                updateUIForUser(true);
            } catch (e) {}
        }
    </script>
</body>
</html>
