<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>开发者社区 · KAVA</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,200" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6750A4;
            --primary-light: #7c6ab3;
            --surface: #ffffff;
            --background: #f8f9fa;
            --text: #1a1a1a;
            --text-secondary: #666666;
            --border: #e0e0e0;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
            --muted: #9e9e9e;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        
        .header {
            background: var(--surface);
            border-radius: 30px;
            padding: 10px 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            position: sticky;
            top: 8px;
            z-index: 100;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        
        .logo .material-symbols-outlined {
            font-size: 24px;
            color: var(--primary);
        }
        
        .logo span:last-child {
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .right-section {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .online-count {
            background: #2d2d2d;
            color: white;
            padding: 5px 10px;
            border-radius: 30px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 4px;
            background: var(--success);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
            min-height: 40px;
        }
        
        .btn.secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn.small {
            padding: 5px 10px;
            font-size: 0.8rem;
            min-height: 32px;
        }
        
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        
        @media (min-width: 768px) {
            .profile-grid {
                grid-template-columns: 280px 1fr;
            }
        }
        
        .profile-card {
            background: var(--surface);
            border-radius: 24px;
            padding: 20px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: sticky;
            top: 80px;
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50px;
            background: #EADDFF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: 600;
            color: #21005E;
            margin: 0 auto 12px;
            cursor: pointer;
            position: relative;
        }
        
        .online-badge-small {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 15px;
            height: 15px;
            border-radius: 7.5px;
            background: var(--success);
            border: 2px solid white;
            display: none;
        }
        
        .online-badge-small.online {
            display: block;
        }
        
        .profile-name {
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 6px;
        }
        
        .profile-bio {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 16px;
            font-size: 0.9rem;
        }
        
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 16px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin: 16px 0;
        }
        
        .stat-item {
            text-align: center;
            cursor: pointer;
        }
        
        .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
        }
        
        .edit-profile-btn {
            width: 100%;
            padding: 10px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 8px;
        }
        
        .main-content {
            background: var(--surface);
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .tabs {
            display: flex;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
            overflow-x: auto;
        }
        
        .tab {
            padding: 8px 0;
            cursor: pointer;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            font-weight: 500;
        }
        
        .compose-box {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 16px;
        }
        
        .compose-box textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 70px;
            font-family: inherit;
            margin-bottom: 8px;
        }
        
        .post {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 12px;
        }
        
        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        
        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: #EADDFF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.1rem;
            position: relative;
        }
        
        .post-author {
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        .post-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        
        .post-content {
            margin-left: 50px;
            line-height: 1.5;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        
        .post-actions {
            display: flex;
            gap: 12px;
            margin-left: 50px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }
        
        .action-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        .action-btn:hover {
            background: #f0f0f0;
        }
        
        .comments-section {
            margin-left: 50px;
            margin-top: 12px;
        }
        
        .comment {
            background: white;
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 8px;
        }
        
        .comment-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }
        
        .comment-author {
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
        }
        
        .comment-time {
            font-size: 0.65rem;
            color: var(--text-secondary);
        }
        
        .add-comment {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        
        .add-comment input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 30px;
            font-size: 0.9rem;
        }
        
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
            backdrop-filter: blur(4px);
        }
        
        .modal-content {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 24px;
            border-radius: 28px;
        }
        
        .modal-content h3 {
            margin-bottom: 16px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .input-wrapper {
            position: relative;
            margin-bottom: 15px;
        }
        
        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            z-index: 1;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            border: 1px solid var(--border);
            border-radius: 30px;
            font-size: 0.95rem;
        }
        
        .code-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        
        .code-input-wrapper {
            position: relative;
            flex: 1;
        }
        
        .code-input-wrapper input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            border: 1px solid var(--border);
            border-radius: 30px;
            font-size: 0.95rem;
        }
        
        .send-code-btn {
            min-width: 100px;
            background: #f0f0f0;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            padding: 12px;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        
        .send-code-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .hidden { display: none !important; }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 2000;
            animation: slideIn 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .error-toast {
            background: var(--danger);
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            color: #999;
            font-size: 0.75rem;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo" onclick="showHome()">
                <span class="material-symbols-outlined">code_blocks</span>
                <span>DevCommunity</span>
            </div>
            
            <div class="right-section">
                <div class="online-count">
                    <span class="online-dot"></span>
                    <span id="onlineCount">0</span>
                </div>
                
                <div id="auth-section">
                    <button class="btn" onclick="showLogin()">
                        <span class="material-symbols-outlined">login</span> 登录
                    </button>
                </div>
                
                <div id="user-section" class="hidden">
                    <span class="badge">
                        <span class="material-symbols-outlined" style="font-size: 16px;">verified</span> 已验证
                    </span>
                    <button class="btn small" onclick="logout()">
                        <span class="material-symbols-outlined">logout</span> 退出
                    </button>
                </div>
            </div>
        </header>

        <!-- 首页视图 -->
        <div id="homeView">
            <div class="profile-grid">
                <div class="profile-card">
                    <div class="profile-avatar" id="homeAvatar" onclick="showEditProfile()">
                        U
                        <span class="online-badge-small" id="homeOnlineBadge"></span>
                    </div>
                    <div class="profile-name" id="homeDisplayName">未登录</div>
                    <div class="profile-bio" id="homeBio">请先登录</div>
                    
                    <div class="profile-stats">
                        <div class="stat-item" onclick="showMyPosts()">
                            <div class="stat-value" id="homePostCount">0</div>
                            <div class="stat-label">帖子</div>
                        </div>
                        <div class="stat-item" onclick="showMyComments()">
                            <div class="stat-value" id="homeCommentCount">0</div>
                            <div class="stat-label">评论</div>
                        </div>
                        <div class="stat-item" onclick="showMyLikes()">
                            <div class="stat-value" id="homeLikeCount">0</div>
                            <div class="stat-label">获赞</div>
                        </div>
                        <div class="stat-item" onclick="showMyFollowers()">
                            <div class="stat-value" id="homeFollowerCount">0</div>
                            <div class="stat-label">粉丝</div>
                        </div>
                    </div>
                    
                    <button class="edit-profile-btn" onclick="showEditProfile()">
                        <span class="material-symbols-outlined">edit</span> 编辑资料
                    </button>
                </div>
                
                <div class="main-content">
                    <div id="compose-section" class="compose-box hidden">
                        <textarea id="postContent" placeholder="分享你的开发心得..."></textarea>
                        <button class="btn" onclick="publishPost()" style="width:100%;">
                            <span class="material-symbols-outlined">send</span> 发布帖子
                        </button>
                    </div>
                    
                    <div class="tabs">
                        <div class="tab active" onclick="switchTab('posts')">
                            <span class="material-symbols-outlined">post</span> 最新
                        </div>
                        <div class="tab" onclick="switchTab('hot')">
                            <span class="material-symbols-outlined">whatshot</span> 热门
                        </div>
                        <div class="tab" onclick="switchTab('following')">
                            <span class="material-symbols-outlined">group</span> 关注
                        </div>
                    </div>
                    
                    <div id="postsList"></div>
                    <div id="hotPostsList" class="hidden"></div>
                    <div id="followingPostsList" class="hidden"></div>
                </div>
            </div>
        </div>

        <!-- 登录弹窗 -->
        <div id="loginModal" class="modal hidden">
            <div class="modal-content">
                <h3>
                    <span class="material-symbols-outlined">login</span>
                    邮箱验证码登录
                </h3>
                
                <div class="input-wrapper">
                    <span class="input-icon material-symbols-outlined">mail</span>
                    <input type="email" id="loginEmail" placeholder="邮箱" value="511651251@qq.com">
                </div>
                
                <div class="code-row">
                    <div class="code-input-wrapper">
                        <span class="input-icon material-symbols-outlined">pin</span>
                        <input type="text" id="loginCode" placeholder="验证码">
                    </div>
                    <button onclick="sendEmailCode()" id="sendCodeBtn" class="send-code-btn">获取验证码</button>
                </div>
                
                <button class="btn" onclick="doLoginWithCode()" style="width: 100%; padding: 12px; justify-content: center;">登录 / 注册</button>
                
                <p style="text-align:center; margin-top:12px;">
                    <button class="btn secondary small" onclick="hideLogin()" style="justify-content: center;">取消</button>
                </p>
            </div>
        </div>

        <footer class="footer">
            <span class="material-symbols-outlined" style="font-size: 14px;">security</span> 开发者社区 · 用户状态
        </footer>
    </div>

    <script>
        const SUPABASE_URL = 'https://fnlaryjanmfqvnonqfyj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZubGFyeWphbm1mcXZub25xZnlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNzQzNzgsImV4cCI6MjA4NzY1MDM3OH0.4uGXyVd_6XQnK3o1vu_sDhpdRyrM67JFaBm2SnuJf1M';
        
        const EMAIL_SERVICE_URL = 'http://69.165.65.242:3000';
        
        let currentUser = null;
        let allPosts = [];
        let followers = JSON.parse(localStorage.getItem('followers') || '{}');
        let following = JSON.parse(localStorage.getItem('following') || '{}');
        let onlineUsers = JSON.parse(localStorage.getItem('onlineUsers') || '[]');
        let userProfile = null;
        let currentViewUser = null;
        
        let timer = null;
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error-toast' : ''}`;
            toast.innerHTML = `
                <span class="material-symbols-outlined">${isError ? 'error' : 'check_circle'}</span>
                ${message}
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        // ===== 邮箱验证码登录 =====
        async function sendEmailCode() {
            const email = document.getElementById('loginEmail').value.trim();
            
            if (!email) {
                showToast('请输入邮箱', true);
                return;
            }
            
            const btn = document.getElementById('sendCodeBtn');
            btn.disabled = true;
            btn.textContent = '发送中...';
            
            try {
                const res = await fetch(`${EMAIL_SERVICE_URL}/send-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();
                
                if (data.error) {
                    showToast(data.error, true);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                } else {
                    showToast('验证码已发送，请查收邮件');
                    startCountdown();
                }
            } catch (err) {
                showToast('网络错误: ' + err.message, true);
                btn.disabled = false;
                btn.textContent = '获取验证码';
            }
        }
        
        function startCountdown() {
            let countdown = 60;
            const btn = document.getElementById('sendCodeBtn');
            
            if (timer) clearInterval(timer);
            
            timer = setInterval(() => {
                countdown--;
                btn.textContent = `${countdown}秒`;
                
                if (countdown <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                }
            }, 1000);
        }
        
        async function doLoginWithCode() {
            const email = document.getElementById('loginEmail').value.trim();
            const code = document.getElementById('loginCode').value.trim();
            
            if (!email || !code) {
                showToast('请填写邮箱和验证码', true);
                return;
            }
            
            const loginBtn = document.querySelector('.btn[onclick="doLoginWithCode()"]');
            if (loginBtn) {
                loginBtn.disabled = true;
                loginBtn.textContent = '登录中...';
            }
            
            try {
                const res = await fetch(`${EMAIL_SERVICE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });
                
                const data = await res.json();
                console.log('登录返回:', data);
                
                if (data.error) {
                    showToast(data.error, true);
                } else if (data.success) {
                    await loginOrRegisterWithEmail(email);
                } else {
                    showToast('登录失败，请重试', true);
                }
            } catch (err) {
                console.error('登录错误:', err);
                showToast('网络错误: ' + err.message, true);
            } finally {
                if (loginBtn) {
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登录 / 注册';
                }
            }
        }
        
        async function loginOrRegisterWithEmail(email) {
            try {
                const userRes = await fetch(`${SUPABASE_URL}/rest/v1/users?email=eq.${encodeURIComponent(email)}`, {
                    headers: { 'apikey': SUPABASE_KEY }
                });
                
                let users = await userRes.json();
                let user;
                
                if (!users || users.length === 0) {
                    const username = email.split('@')[0];
                    const newUser = {
                        email: email,
                        username: username,
                        avatar: username[0].toUpperCase(),
                        bio: '热爱编程的开发者',
                        role: 'user',
                        status: 'active',
                        created_at: new Date().toISOString(),
                        last_login: new Date().toISOString()
                    };
                    
                    const createRes = await fetch(`${SUPABASE_URL}/rest/v1/users`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=representation'
                        },
                        body: JSON.stringify(newUser)
                    });
                    
                    user = await createRes.json();
                } else {
                    user = users[0];
                    await fetch(`${SUPABASE_URL}/rest/v1/users?id=eq.${user.id}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ last_login: new Date().toISOString() })
                    });
                }
                
                currentUser = {
                    id: user.id,
                    email: user.email,
                    username: user.username,
                    status: user.status || 'active'
                };
                
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                userProfile = {
                    name: user.username || user.email.split('@')[0],
                    bio: user.bio || '热爱编程的开发者',
                    avatar: user.avatar || user.email[0].toUpperCase(),
                };
                
                localStorage.setItem('userProfile', JSON.stringify(userProfile));
                
                updateUIForUser(true);
                hideLogin();
                await loadPosts();
                showToast('登录成功');
                
            } catch (err) {
                console.error('登录错误:', err);
                showToast('网络错误: ' + err.message, true);
            }
        }
        
        // ===== 帖子功能 =====
        async function loadPosts() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/posts?select=*&order=created_at.desc`, {
                    headers: { 'apikey': SUPABASE_KEY }
                });
                allPosts = await res.json();
                renderPosts();
                renderHotPosts();
                renderFollowingPosts();
            } catch (err) {
                console.error('加载帖子失败:', err);
                document.getElementById('postsList').innerHTML = '<div class="empty-state">暂无帖子</div>';
            }
        }
        
        function renderPosts() {
            let html = '';
            allPosts.forEach(post => {
                html += `
                    <div class="post" id="post-${post.id}">
                        <div class="post-header" onclick="viewProfile('${post.author}')">
                            <div class="post-avatar">
                                ${post.author[0].toUpperCase()}
                                ${onlineUsers.includes(post.author) ? '<span class="online-badge-small online"></span>' : ''}
                            </div>
                            <div>
                                <div class="post-author">${post.author}</div>
                                <div class="post-time">${new Date(post.created_at).toLocaleString()}</div>
                            </div>
                        </div>
                        <div class="post-content">${post.content}</div>
                        <div class="post-actions">
                            <button class="action-btn" onclick="toggleLike(${post.id})">
                                <span class="material-symbols-outlined">favorite</span> ${post.likes || 0}
                            </button>
                            <button class="action-btn" onclick="toggleComments(${post.id})">
                                <span class="material-symbols-outlined">comment</span> ${post.comments?.length || 0}
                            </button>
                        </div>
                        <div id="comments-${post.id}" class="comments-section hidden">
                            ${renderComments(post.comments || [])}
                            <div class="add-comment">
                                <input type="text" id="comment-${post.id}" placeholder="写评论...">
                                <button class="btn secondary small" onclick="addComment(${post.id})">发送</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('postsList').innerHTML = html || '<div class="empty-state">暂无帖子</div>';
        }
        
        function renderComments(comments) {
            if (!comments || comments.length === 0) return '';
            return comments.map(c => `
                <div class="comment">
                    <div class="comment-header">
                        <span class="comment-author" onclick="viewProfile('${c.author}')">${c.author}</span>
                        <span class="comment-time">${new Date(c.created_at).toLocaleString()}</span>
                    </div>
                    <div class="comment-content">${c.content}</div>
                </div>
            `).join('');
        }
        
        function renderHotPosts() {
            const hotPosts = [...allPosts].sort((a, b) => (b.likes || 0) - (a.likes || 0)).slice(0, 10);
            let html = '';
            hotPosts.forEach(post => {
                html += `
                    <div class="post">
                        <div class="post-header" onclick="viewProfile('${post.author}')">
                            <div class="post-avatar">${post.author[0].toUpperCase()}</div>
                            <div>
                                <div class="post-author">${post.author}</div>
                                <div class="post-time">🔥 ${post.likes || 0} 点赞</div>
                            </div>
                        </div>
                        <div class="post-content">${post.content}</div>
                    </div>
                `;
            });
            document.getElementById('hotPostsList').innerHTML = html;
        }
        
        function renderFollowingPosts() {
            if (!currentUser) {
                document.getElementById('followingPostsList').innerHTML = '<div class="empty-state">请先登录查看关注的人</div>';
                return;
            }
            
            const username = currentUser.email.split('@')[0];
            const followingList = following[username] || [];
            const followingPosts = allPosts.filter(p => followingList.includes(p.author));
            
            let html = '';
            followingPosts.forEach(post => {
                html += `
                    <div class="post">
                        <div class="post-header" onclick="viewProfile('${post.author}')">
                            <div class="post-avatar">${post.author[0].toUpperCase()}</div>
                            <div>
                                <div class="post-author">${post.author}</div>
                                <div class="post-time">${new Date(post.created_at).toLocaleString()}</div>
                            </div>
                        </div>
                        <div class="post-content">${post.content}</div>
                    </div>
                `;
            });
            document.getElementById('followingPostsList').innerHTML = html || '<div class="empty-state">暂无关注的人的帖子</div>';
        }
        
        async function publishPost() {
            if (!currentUser) {
                showToast('请先登录', true);
                return;
            }
            
            const content = document.getElementById('postContent').value.trim();
            if (!content) return;
            
            try {
                const username = currentUser.email.split('@')[0];
                
                await fetch(`${SUPABASE_URL}/rest/v1/posts`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ author: username, content, likes: 0, comments: [] })
                });
                
                document.getElementById('postContent').value = '';
                await loadPosts();
                showToast('发布成功');
            } catch (err) {
                showToast('发布失败', true);
            }
        }
        
        async function addComment(postId) {
            if (!currentUser) {
                showToast('请先登录', true);
                return;
            }
            
            const input = document.getElementById(`comment-${postId}`);
            const content = input.value.trim();
            if (!content) return;
            
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;
            
            const comments = post.comments || [];
            comments.push({
                author: currentUser.email.split('@')[0],
                content: content,
                created_at: new Date().toISOString()
            });
            
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/posts?id=eq.${postId}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ comments })
                });
                
                post.comments = comments;
                input.value = '';
                renderPosts();
                showToast('评论成功');
            } catch (err) {
                showToast('评论失败', true);
            }
        }
        
        async function toggleLike(postId) {
            if (!currentUser) {
                showToast('请先登录', true);
                return;
            }
            
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;
            
            const newLikes = (post.likes || 0) + 1;
            
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/posts?id=eq.${postId}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ likes: newLikes })
                });
                
                post.likes = newLikes;
                renderPosts();
                renderHotPosts();
                showToast('点赞成功');
            } catch (err) {
                showToast('点赞失败', true);
            }
        }
        
        function toggleComments(postId) {
            const el = document.getElementById(`comments-${postId}`);
            if (el) el.classList.toggle('hidden');
        }
        
        // ===== 用户界面更新 =====
        function updateUIForUser(isLoggedIn) {
            const authSection = document.getElementById('auth-section');
            const userSection = document.getElementById('user-section');
            const composeSection = document.getElementById('compose-section');
            const homeAvatar = document.getElementById('homeAvatar');
            const homeDisplayName = document.getElementById('homeDisplayName');
            const homeBio = document.getElementById('homeBio');
            
            if (isLoggedIn && currentUser) {
                authSection.classList.add('hidden');
                userSection.classList.remove('hidden');
                composeSection.classList.remove('hidden');
                
                if (userProfile) {
                    homeAvatar.textContent = userProfile.avatar || currentUser.email[0].toUpperCase();
                    homeDisplayName.textContent = userProfile.name || currentUser.email.split('@')[0];
                    homeBio.textContent = userProfile.bio || '热爱编程的开发者';
                }
                
                updateOnlineStatus();
            } else {
                authSection.classList.remove('hidden');
                userSection.classList.add('hidden');
                composeSection.classList.add('hidden');
                homeAvatar.textContent = 'U';
                homeDisplayName.textContent = '未登录';
                homeBio.textContent = '请先登录';
                currentUser = null;
            }
        }
        
        function updateOnlineStatus() {
            if (currentUser) {
                const username = currentUser.email.split('@')[0];
                if (!onlineUsers.includes(username)) {
                    onlineUsers.push(username);
                    localStorage.setItem('onlineUsers', JSON.stringify(onlineUsers));
                }
            }
            document.getElementById('onlineCount').textContent = onlineUsers.length;
        }
        
        function logout() {
            if (currentUser) {
                const username = currentUser.email.split('@')[0];
                onlineUsers = onlineUsers.filter(u => u !== username);
                localStorage.setItem('onlineUsers', JSON.stringify(onlineUsers));
            }
            currentUser = null;
            userProfile = null;
            localStorage.removeItem('currentUser');
            localStorage.removeItem('userProfile');
            updateUIForUser(false);
            showToast('已退出');
        }
        
        function showHome() {
            document.getElementById('homeView').classList.remove('hidden');
        }
        
        function showLogin() { 
            document.getElementById('loginModal').classList.remove('hidden'); 
        }
        
        function hideLogin() { 
            document.getElementById('loginModal').classList.add('hidden');
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
            const btn = document.getElementById('sendCodeBtn');
            if (btn) {
                btn.disabled = false;
                btn.textContent = '获取验证码';
            }
        }
        
        function showEditProfile() {
            showToast('功能开发中', true);
        }
        
        function showMyPosts() {
            if (!currentUser) {
                showToast('请先登录', true);
                return;
            }
            showToast('功能开发中', true);
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.closest('.tab').classList.add('active');
            document.getElementById('postsList').classList.add('hidden');
            document.getElementById('hotPostsList').classList.add('hidden');
            document.getElementById('followingPostsList').classList.add('hidden');
            if (tab === 'posts') document.getElementById('postsList').classList.remove('hidden');
            else if (tab === 'hot') document.getElementById('hotPostsList').classList.remove('hidden');
            else document.getElementById('followingPostsList').classList.remove('hidden');
        }
        
        // 初始化
        onlineUsers = JSON.parse(localStorage.getItem('onlineUsers') || '[]');
        document.getElementById('onlineCount').textContent = onlineUsers.length;
        loadPosts();
        
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            try {
                currentUser = JSON.parse(savedUser);
                userProfile = JSON.parse(localStorage.getItem('userProfile') || '{}');
                updateUIForUser(true);
            } catch (e) {}
        }
    </script>
</body>
</html>
